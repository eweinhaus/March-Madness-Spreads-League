# Free scheduler (Vercel Hobby cron is daily-only). Runs every 5 minutes during the tournament.
# Repo → Settings → Secrets → Actions:
#   AUTO_RESOLVE_BACKEND_URL  e.g. https://your-api.vercel.app (no trailing slash)
#   CRON_SECRET               same value as CRON_SECRET on Vercel backend env

name: Auto-resolve games

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  call-auto-resolve:
    runs-on: ubuntu-latest
    steps:
      - name: POST /internal/auto-resolve-games
        env:
          BACKEND_URL: ${{ secrets.AUTO_RESOLVE_BACKEND_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BACKEND_URL" ] || [ -z "$SECRET" ]; then
            echo "Set GitHub Actions secrets: AUTO_RESOLVE_BACKEND_URL and CRON_SECRET"
            exit 1
          fi
          curl -sfS -X POST "${BACKEND_URL}/internal/auto-resolve-games" \
            -H "Authorization: Bearer ${SECRET}" \
            -H "Content-Type: application/json"
